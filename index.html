<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>貨櫃裝載計算表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   Apple-style Design System
═══════════════════════════════════════════ */
:root {
  /* Apple SF-style palette */
  --bg:           #f2f2f7;
  --bg2:          #e5e5ea;
  --surface:      #ffffff;
  --surface-glass:rgba(255,255,255,0.82);
  --border:       rgba(60,60,67,0.13);
  --separator:    rgba(60,60,67,0.09);

  /* Brand colors — rich gradient trio */
  --blue:         #007AFF;
  --teal:         #30D158;
  --indigo:       #5E5CE6;
  --orange:       #FF9F0A;
  --red:          #FF3B30;
  --pink:         #FF375F;
  --cyan:         #32ADE6;

  /* Accent (primary action) */
  --accent:       #007AFF;
  --accent-light: rgba(0,122,255,0.10);
  --accent2:      #30D158;
  --accent2-light:rgba(48,209,88,0.10);

  /* Status */
  --ok:           #30D158;
  --ok-bg:        rgba(48,209,88,0.10);
  --warn:         #FF3B30;
  --warn-bg:      rgba(255,59,48,0.10);

  /* Text hierarchy */
  --t1:           #1c1c1e;
  --t2:           #3a3a3c;
  --t3:           #636366;
  --t4:           #aeaeb2;

  /* Typography */
  --sans:  'Noto Sans TC', -apple-system, 'SF Pro Text', sans-serif;
  --mono:  'JetBrains Mono', 'SF Mono', monospace;

  /* Shape */
  --r-sm:   10px;
  --r-md:   14px;
  --r-lg:   20px;
  --r-xl:   28px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
}

/* ═══════════════════════════════════════════
   Base Reset
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  padding-bottom: 48px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════════
   Header — frosted glass, sticky
═══════════════════════════════════════════ */
.header {
  background: var(--surface-glass);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  padding: 18px 20px 14px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 200;
}

.header-inner {
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.header-icon {
  width: 38px; height: 38px;
  background: linear-gradient(145deg, #007AFF, #5E5CE6);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 8px rgba(0,122,255,0.30);
  flex-shrink: 0;
}

.header-text { text-align: left; }

.header h1 {
  font-size: 17px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -0.3px;
}

.header p {
  font-size: 12px;
  color: var(--t3);
  margin-top: 1px;
  font-family: var(--mono);
  letter-spacing: 0.02em;
}

/* ═══════════════════════════════════════════
   Main layout
═══════════════════════════════════════════ */
.main {
  padding: 16px 16px;
  max-width: 600px;
  margin: 0 auto;
}

/* ═══════════════════════════════════════════
   Section label (iOS grouped style)
═══════════════════════════════════════════ */
.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--t3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 0 4px;
  margin: 20px 0 8px;
}
.section-label:first-child { margin-top: 8px; }

/* ═══════════════════════════════════════════
   Card — iOS grouped list style
═══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border-radius: var(--r-lg);
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border: 0.5px solid var(--border);
}

.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px 12px;
  border-bottom: 0.5px solid var(--separator);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.card-head-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.card-head-icon.blue   { background: linear-gradient(145deg, #007AFF, #5AC8FA); }
.card-head-icon.teal   { background: linear-gradient(145deg, #30D158, #34C759); }
.card-head-icon.indigo { background: linear-gradient(145deg, #5E5CE6, #AF52DE); }
.card-head-icon.orange { background: linear-gradient(145deg, #FF9F0A, #FF6B00); }

.card-head-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: -0.2px;
  flex: 1;
}

.chevron {
  font-size: 12px;
  color: var(--t4);
  transition: transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  margin-left: auto;
}
.card-head.open .chevron { transform: rotate(180deg); }

.card-body { padding: 16px 18px 18px; }
.card-body.collapsed { display: none; }

/* ═══════════════════════════════════════════
   Container type selector — pill tabs
═══════════════════════════════════════════ */
.type-tabs {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 7px;
  margin-bottom: 18px;
  background: var(--bg);
  border-radius: var(--r-md);
  padding: 5px;
}

.type-tab {
  border-radius: 10px;
  padding: 9px 4px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--t3);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
  font-family: var(--mono);
  letter-spacing: 0.02em;
  border: none;
  background: transparent;
  -webkit-tap-highlight-color: transparent;
}

.type-tab.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: var(--shadow-md);
}

.type-tab .sub {
  font-size: 10px;
  font-weight: 400;
  color: var(--t4);
  margin-top: 2px;
  font-family: var(--sans);
  letter-spacing: 0;
  display: block;
}

.type-tab.active .sub { color: rgba(0,122,255,0.65); }

/* ═══════════════════════════════════════════
   Form fields — iOS style
═══════════════════════════════════════════ */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 11px;
}
.form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }

.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--t3);
  margin-bottom: 6px;
  letter-spacing: 0.01em;
}

.field input, .field select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: var(--r-sm);
  padding: 11px 12px;
  font-size: 16px; /* prevents iOS zoom */
  color: var(--t1);
  font-family: var(--mono);
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.field input:focus, .field select:focus {
  background: var(--surface);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
}

.field.full  { grid-column: span 2; }
.field.full3 { grid-column: span 3; }

/* ═══════════════════════════════════════════
   Toggle — exact Apple iOS style
═══════════════════════════════════════════ */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 2px;
}

.toggle-row label {
  font-size: 15px;
  font-weight: 400;
  color: var(--t1);
}

.toggle {
  position: relative;
  width: 51px;
  height: 31px;
  flex-shrink: 0;
}
.toggle input { display: none; }

.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--bg2);
  border-radius: 16px;
  cursor: pointer;
  transition: background 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
}

.toggle.on .toggle-track {
  background: var(--teal);
}

.toggle-knob {
  position: absolute;
  top: 2px; left: 2px;
  width: 27px; height: 27px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.22), 0 1px 2px rgba(0,0,0,0.12);
  transition: left 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  pointer-events: none;
}
.toggle.on .toggle-knob { left: 22px; }

/* ═══════════════════════════════════════════
   Calculate button — full-width Apple blue
═══════════════════════════════════════════ */
.calc-btn {
  width: 100%;
  background: linear-gradient(180deg, #1a8cff 0%, #0065e0 100%);
  color: #ffffff;
  border: none;
  border-radius: var(--r-md);
  padding: 15px 20px;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  margin-top: 14px;
  letter-spacing: 0.01em;
  transition: opacity 0.15s, transform 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 14px rgba(0,100,220,0.35), 0 1px 4px rgba(0,100,220,0.20);
  -webkit-tap-highlight-color: transparent;
}
.calc-btn:active {
  opacity: 0.88;
  transform: scale(0.98);
}

/* ═══════════════════════════════════════════
   Result section
═══════════════════════════════════════════ */
.result-section { display: none; }
.result-section.visible { display: block; }

/* ═══════════════════════════════════════════
   Best result card — hero gradient
═══════════════════════════════════════════ */
.best-card {
  background: linear-gradient(145deg, #007AFF 0%, #5E5CE6 55%, #30D158 100%);
  border-radius: var(--r-xl);
  padding: 24px 22px 22px;
  margin-bottom: 16px;
  box-shadow: 0 8px 30px rgba(0,122,255,0.28), 0 2px 8px rgba(94,92,230,0.15);
  position: relative;
  overflow: hidden;
}

/* subtle bokeh circles */
.best-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.best-card::after {
  content: '';
  position: absolute;
  bottom: -30px; left: -20px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(48,209,88,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.best-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.best-count {
  font-size: 64px;
  font-weight: 800;
  font-family: var(--mono);
  color: #ffffff;
  line-height: 1;
  margin-bottom: 2px;
  letter-spacing: -2px;
}

.best-count span {
  font-size: 22px;
  font-weight: 400;
  color: rgba(255,255,255,0.72);
  margin-left: 6px;
  letter-spacing: 0;
}

#r-orient {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  font-family: var(--mono);
  margin-top: 6px;
  letter-spacing: 0.01em;
}

.best-stats-row {
  display: flex;
  gap: 0;
  margin-top: 18px;
  background: rgba(255,255,255,0.15);
  border-radius: 14px;
  overflow: hidden;
}

.best-stat {
  flex: 1;
  padding: 11px 10px;
  text-align: center;
  position: relative;
}

.best-stat + .best-stat::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 0.5px;
  background: rgba(255,255,255,0.25);
}

.best-stat .sl {
  font-size: 10px;
  color: rgba(255,255,255,0.60);
  margin-bottom: 4px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.best-stat .sv {
  font-size: 14px;
  font-weight: 700;
  font-family: var(--mono);
  color: #ffffff;
  letter-spacing: 0.01em;
}

.best-stat .sv.warn {
  color: #FFD60A;
}

.best-stat .sv.ok {
  color: #ccffdd;
}

/* ═══════════════════════════════════════════
   Progress bar — inside best card
═══════════════════════════════════════════ */
.progress-wrap { margin-top: 16px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  margin-bottom: 6px;
  font-weight: 500;
}

.progress-track {
  height: 7px;
  background: rgba(255,255,255,0.22);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, rgba(255,255,255,0.70), #ffffff);
  border-radius: 4px;
  transition: width 0.75s cubic-bezier(0.34,1.56,0.64,1);
}

/* ═══════════════════════════════════════════
   Comparison table
═══════════════════════════════════════════ */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -18px;
  padding: 0 18px;
}

table {
  width: 100%;
  min-width: 500px;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  background: var(--bg);
  color: var(--t3);
  font-weight: 600;
  padding: 9px 10px;
  text-align: center;
  border-bottom: 0.5px solid var(--separator);
  white-space: nowrap;
  font-size: 12px;
  letter-spacing: 0.02em;
}

th:first-child { text-align: left; border-radius: 0; }

td {
  padding: 10px 10px;
  text-align: center;
  border-bottom: 0.5px solid var(--separator);
  font-family: var(--mono);
  color: var(--t2);
  white-space: nowrap;
  font-size: 12.5px;
}

td:first-child { text-align: left; }

tr:last-child td { border-bottom: none; }

tr.best-row-tr td {
  background: rgba(0,122,255,0.05);
}

tr.best-row-tr td:first-child {
  color: var(--accent);
  font-weight: 600;
}

.best-badge {
  display: inline-block;
  background: linear-gradient(135deg, #007AFF, #5E5CE6);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  margin-left: 5px;
  vertical-align: middle;
  font-family: var(--sans);
  letter-spacing: 0.02em;
}

.warn-text { color: var(--warn) !important; font-weight: 600; }
.ok-text   { color: var(--ok)   !important; font-weight: 600; }

/* ═══════════════════════════════════════════
   Diagram view tabs — segmented control
═══════════════════════════════════════════ */
.view-tabs {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 0;
  margin-bottom: 14px;
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 3px;
  border: 0.5px solid var(--border);
}

.vtab {
  border-radius: 8px;
  padding: 8px 4px;
  text-align: center;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--t3);
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  -webkit-tap-highlight-color: transparent;
}

.vtab.active {
  background: var(--surface);
  color: var(--accent);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}

.view-panel { display: none; }
.view-panel.active { display: block; }

.canvas-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 10px 10px 6px;
  border: 0.5px solid var(--border);
}

canvas { display: block; }

.view-title {
  font-size: 12px;
  color: var(--t3);
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: 0.03em;
}

/* info text panel */
#info-detail {
  font-size: 13.5px;
  color: var(--t2);
  line-height: 1.9;
  font-family: var(--mono);
  background: var(--bg);
  padding: 14px 16px;
  border-radius: var(--r-sm);
  border: 0.5px solid var(--border);
  letter-spacing: 0.01em;
}

/* ═══════════════════════════════════════════
   Divider inside card body
═══════════════════════════════════════════ */
.field-divider {
  height: 0.5px;
  background: var(--separator);
  margin: 14px 0;
}

/* ═══════════════════════════════════════════
   Print
═══════════════════════════════════════════ */
@media print {
  .header, .input-section, .calc-btn, .view-tabs, .canvas-wrap { display: none !important; }
  body { background: white; color: #000; padding: 0; }
  .best-card { border: 1px solid #ccc; background: #f9f9f9; }
}

/* ═══════════════════════════════════════════
   Responsive
═══════════════════════════════════════════ */
@media (max-width: 360px) {
  .form-grid        { grid-template-columns: 1fr; }
  .form-grid.cols3  { grid-template-columns: 1fr 1fr; }
  .type-tabs        { grid-template-columns: repeat(2,1fr); }
  .best-count       { font-size: 52px; }
}

@media (min-width: 600px) {
  .main        { padding: 20px 20px; }
  .card-body   { padding: 20px 22px 22px; }
  .best-count  { font-size: 72px; }
}

/* ═══════════════════════════════════════════
   Subtle entrance animation
═══════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card, .best-card {
  animation: fadeUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94) both;
}

.result-section.visible .best-card { animation-delay: 0.05s; }
.result-section.visible .card:nth-child(1) { animation-delay: 0.10s; }
.result-section.visible .card:nth-child(2) { animation-delay: 0.15s; }
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<div class="header">
  <div class="header-inner">
    <div class="header-icon">📦</div>
    <div class="header-text">
      <h1>貨櫃裝載計算表</h1>
      <p>Container Loading Calculator</p>
    </div>
  </div>
</div>

<div class="main">

  <!-- ═══════════ 貨櫃規格 ═══════════ -->
  <div class="section-label">貨櫃規格</div>
  <div class="card input-section">
    <div class="card-head open" onclick="toggleCard(this)">
      <div class="card-head-icon blue">🚢</div>
      <span class="card-head-title">貨櫃設置</span>
      <span class="chevron">▼</span>
    </div>
    <div class="card-body">
      <div class="type-tabs">
        <div class="type-tab active" data-type="40HQ" onclick="selectType(this)">
          40HQ
          <span class="sub">最常用</span>
        </div>
        <div class="type-tab" data-type="20GP" onclick="selectType(this)">
          20GP
          <span class="sub">標準</span>
        </div>
        <div class="type-tab" data-type="40GP" onclick="selectType(this)">
          40GP
          <span class="sub">標準</span>
        </div>
        <div class="type-tab" data-type="45HQ" onclick="selectType(this)">
          45HQ
          <span class="sub">加長</span>
        </div>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>長度 (cm)</label>
          <input type="number" id="c-len" value="1201" inputmode="decimal">
        </div>
        <div class="field">
          <label>寬度 (cm)</label>
          <input type="number" id="c-wid" value="234" inputmode="decimal">
        </div>
        <div class="field">
          <label>高度 (cm)</label>
          <input type="number" id="c-hgt" value="269" inputmode="decimal">
        </div>
        <div class="field">
          <label>最大載重 (kg)</label>
          <input type="number" id="c-wgt" value="26000" inputmode="decimal">
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ 箱子規格 ═══════════ -->
  <div class="section-label">箱子規格</div>
  <div class="card input-section">
    <div class="card-head open" onclick="toggleCard(this)">
      <div class="card-head-icon teal">📫</div>
      <span class="card-head-title">成品箱尺寸</span>
      <span class="chevron">▼</span>
    </div>
    <div class="card-body">
      <div class="form-grid cols3">
        <div class="field">
          <label>長 (cm)</label>
          <input type="number" id="b-len" value="60" inputmode="decimal">
        </div>
        <div class="field">
          <label>寬 (cm)</label>
          <input type="number" id="b-wid" value="40" inputmode="decimal">
        </div>
        <div class="field">
          <label>高 (cm)</label>
          <input type="number" id="b-hgt" value="30" inputmode="decimal">
        </div>
      </div>
      <div class="form-grid" style="margin-top:12px">
        <div class="field">
          <label>每箱重量 (kg)</label>
          <input type="number" id="b-wgt" value="15" inputmode="decimal">
        </div>
        <div class="field" style="display:flex;flex-direction:column;justify-content:flex-end;">
          <div class="toggle-row" style="padding-top:0">
            <label>允許翻轉</label>
            <div class="toggle on" id="rot-toggle" onclick="toggleRot(this)">
              <input type="checkbox" id="allow-rot" checked>
              <div class="toggle-track"></div>
              <div class="toggle-knob"></div>
            </div>
          </div>
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()">
        <span>⚡</span> 計算裝載方案
      </button>
    </div>
  </div>

  <!-- ═══════════ RESULTS ═══════════ -->
  <div class="result-section" id="result-section">

    <!-- Hero best result -->
    <div class="section-label">最佳裝載結果</div>
    <div class="best-card">
      <div class="best-label">✦ 最佳裝載方案</div>
      <div class="best-count" id="r-count">0<span>箱</span></div>
      <div id="r-orient" style="font-size:12px;margin-top:4px;font-family:var(--mono)"></div>
      <div class="best-stats-row">
        <div class="best-stat">
          <div class="sl">擺放軸向</div>
          <div class="sv" id="r-axis">—</div>
        </div>
        <div class="best-stat">
          <div class="sl">總重量</div>
          <div class="sv" id="r-weight">—</div>
        </div>
        <div class="best-stat">
          <div class="sl">過重狀態</div>
          <div class="sv" id="r-overw">—</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>空間利用率</span>
          <span id="r-util">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="r-prog" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Comparison table -->
    <div class="section-label">方案比較</div>
    <div class="card">
      <div class="card-head open" onclick="toggleCard(this)">
        <div class="card-head-icon orange">📊</div>
        <span class="card-head-title">所有方案比較</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>方向</th>
                <th>尺寸</th>
                <th>長×寬×高</th>
                <th>總箱</th>
                <th>重量(kg)</th>
                <th>利用率</th>
                <th>狀態</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Diagrams -->
    <div class="section-label">裝載示意圖</div>
    <div class="card">
      <div class="card-head open" onclick="toggleCard(this)">
        <div class="card-head-icon indigo">🗺</div>
        <span class="card-head-title">視圖預覽</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="view-tabs">
          <div class="vtab active" data-view="top"   onclick="switchView(this)">頂視圖</div>
          <div class="vtab"        data-view="front" onclick="switchView(this)">前視圖</div>
          <div class="vtab"        data-view="side"  onclick="switchView(this)">側視圖</div>
          <div class="vtab"        data-view="info"  onclick="switchView(this)">說明</div>
        </div>

        <div class="view-panel active" id="v-top">
          <div class="view-title">頂視圖（俯視）— 長 × 寬</div>
          <div class="canvas-wrap"><canvas id="top-canvas"></canvas></div>
        </div>
        <div class="view-panel" id="v-front">
          <div class="view-title">前視圖 — 寬 × 高</div>
          <div class="canvas-wrap"><canvas id="front-canvas"></canvas></div>
        </div>
        <div class="view-panel" id="v-side">
          <div class="view-title">側視圖 — 長 × 高</div>
          <div class="canvas-wrap"><canvas id="side-canvas"></canvas></div>
        </div>
        <div class="view-panel" id="v-info">
          <div id="info-detail"></div>
        </div>
      </div>
    </div>

  </div><!-- /result-section -->

</div><!-- /main -->

<script>
const PRESETS = {
  '20GP': { len:590,  wid:234, hgt:238, wgt:21770 },
  '40GP': { len:1201, wid:234, hgt:238, wgt:26760 },
  '40HQ': { len:1201, wid:234, hgt:269, wgt:26000 },
  '45HQ': { len:1356, wid:234, hgt:269, wgt:29000 }
};

function toggleCard(head) {
  const body = head.nextElementSibling;
  const isOpen = head.classList.contains('open');
  head.classList.toggle('open');
  if (isOpen) {
    body.classList.add('collapsed');
  } else {
    body.classList.remove('collapsed');
  }
}

function selectType(el) {
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const p = PRESETS[el.dataset.type];
  document.getElementById('c-len').value = p.len;
  document.getElementById('c-wid').value = p.wid;
  document.getElementById('c-hgt').value = p.hgt;
  document.getElementById('c-wgt').value = p.wgt;
}

function switchView(el) {
  document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('v-' + el.dataset.view).classList.add('active');
}

function toggleRot(el) {
  el.classList.toggle('on');
  const cb = document.getElementById('allow-rot');
  cb.checked = el.classList.contains('on');
}

function calculate(doScroll = true) {
  const cLen = +document.getElementById('c-len').value;
  const cWid = +document.getElementById('c-wid').value;
  const cHgt = +document.getElementById('c-hgt').value;
  const cWgt = +document.getElementById('c-wgt').value;
  const bLen = +document.getElementById('b-len').value;
  const bWid = +document.getElementById('b-wid').value;
  const bHgt = +document.getElementById('b-hgt').value;
  const bWgt = +document.getElementById('b-wgt').value;
  const rot  = document.getElementById('allow-rot').checked;

  if (!cLen||!cWid||!cHgt||!bLen||!bWid||!bHgt||!bWgt) return;

  const orients = rot ? [
    { dims:[bLen,bWid,bHgt], name:'長×寬×高' },
    { dims:[bLen,bHgt,bWid], name:'長×高×寬' },
    { dims:[bWid,bLen,bHgt], name:'寬×長×高' },
    { dims:[bWid,bHgt,bLen], name:'寬×高×長' },
    { dims:[bHgt,bLen,bWid], name:'高×長×寬' },
    { dims:[bHgt,bWid,bLen], name:'高×寬×長' }
  ] : [{ dims:[bLen,bWid,bHgt], name:'長×寬×高' }];

  const results = orients.map(o => {
    const [l,w,h] = o.dims;
    const lc = Math.floor(cLen/l);
    const wc = Math.floor(cWid/w);
    const hc = Math.floor(cHgt/h);
    const total = lc*wc*hc;
    const tw = total*bWgt;
    const ow = tw > cWgt;
    const adj = ow ? Math.floor(cWgt/bWgt) : total;
    const util = (total*(l*w*h)/(cLen*cWid*cHgt)*100).toFixed(1);
    return { name:o.name, dims:`${l}×${w}×${h}`, axis:`${lc}×${wc}×${hc}`,
             total, tw:tw.toFixed(0), ow, adj, util,
             boxDims:[l,w,h], counts:[lc,wc,hc] };
  });

  results.sort((a,b) => b.adj - a.adj);
  const best = results[0];

  // Best card
  document.getElementById('r-count').innerHTML = `${best.adj}<span>箱</span>`;
  document.getElementById('r-orient').textContent = `擺放方式：${best.name}  ／  箱子尺寸：${best.dims} cm`;
  document.getElementById('r-axis').textContent = best.axis;
  document.getElementById('r-weight').textContent = `${best.tw} kg`;
  const ow = best.ow;
  const owEl = document.getElementById('r-overw');
  owEl.textContent = ow ? '⚠ 超重' : '✔ 正常';
  owEl.className = 'sv ' + (ow ? 'warn' : 'ok');
  document.getElementById('r-util').textContent = best.util + '%';
  document.getElementById('r-prog').style.width = Math.min(parseFloat(best.util), 100) + '%';

  // Table
  const tb = document.getElementById('results-body');
  tb.innerHTML = '';
  results.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i===0) tr.className = 'best-row-tr';
    tr.innerHTML = `
      <td>${r.name}${i===0?'<span class="best-badge">最佳</span>':''}</td>
      <td>${r.dims}</td>
      <td>${r.axis}</td>
      <td>${r.adj}${r.ow?'<span class="warn-text">*</span>':''}</td>
      <td class="${r.ow?'warn-text':''}">${r.tw}</td>
      <td>${r.util}%</td>
      <td class="${r.ow?'warn-text':'ok-text'}">${r.ow?'超重':'正常'}</td>
    `;
    tb.appendChild(tr);
  });

  // Info
  document.getElementById('info-detail').innerHTML = `
貨櫃類型：${document.querySelectorAll('.type-tab.active')[0]?.dataset.type||'自訂'}<br>
貨櫃內尺寸：${cLen} × ${cWid} × ${cHgt} cm<br>
最大載重：${cWgt} kg<br>
─────────────────<br>
箱子尺寸：${bLen} × ${bWid} × ${bHgt} cm<br>
每箱重量：${bWgt} kg<br>
允許翻轉：${rot?'是':'否'}<br>
─────────────────<br>
最佳方案裝載：${best.adj} 箱<br>
擺放方式：${best.name}<br>
軸向排列：${best.axis}（長×寬×高）<br>
總重量：${best.tw} kg${best.ow?' ⚠ 超重':''}<br>
空間利用率：${best.util}%
  `.trim();

  // Draw
  drawAll(best, cLen, cWid, cHgt);

  // Show result
  const rs = document.getElementById('result-section');
  rs.classList.add('visible');
  if (doScroll) {
    requestAnimationFrame(() => {
      setTimeout(() => {
        rs.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 80);
    });
  }
}

function drawAll(result, cLen, cWid, cHgt) {
  const [bLen, bWid, bHgt] = result.boxDims;
  const [lc, wc, hc] = result.counts;

  // Bright, distinct fill colors (light enough to show labels on top)
  const FILLS = [
    '#4fc3f7','#81c784','#ffb74d','#f48fb1','#ce93d8',
    '#80cbc4','#fff176','#ffcc80','#a5d6a7','#90caf9'
  ];
  const STROKES = [
    '#0288d1','#388e3c','#e65100','#c2185b','#7b1fa2',
    '#00695c','#f9a825','#ef6c00','#2e7d32','#1565c0'
  ];

  const PAD  = 44;
  const PADR = 10;
  const PADT = 28;

  function setupCanvas(id, cW, cH) {
    const canvas = document.getElementById(id);
    const maxW = Math.min(window.innerWidth - 48, 600);
    const maxH = 320;
    const scale = Math.min((maxW - PAD - PADR) / cW, (maxH - PADT - PAD) / cH);
    canvas.width  = Math.ceil(cW * scale) + PAD + PADR;
    canvas.height = Math.ceil(cH * scale) + PADT + PAD;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return { ctx, scale, ox: PAD, oy: PADT, cW, cH };
  }

  function drawBoxGrid(ctx, ox, oy, scale, cols, rows, bW, bH, colorIdx) {
    for (let c = 0; c < cols; c++) {
      for (let r = 0; r < rows; r++) {
        const idx = (c * 3 + r * 7) % FILLS.length;
        const x = ox + c * bW * scale;
        const y = oy + r * bH * scale;
        const w = bW * scale;
        const h = bH * scale;

        ctx.fillStyle = FILLS[idx];
        ctx.fillRect(x, y, w, h);

        const grad = ctx.createLinearGradient(x, y, x + w, y + h);
        grad.addColorStop(0, 'rgba(255,255,255,0.18)');
        grad.addColorStop(1, 'rgba(0,0,0,0.10)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);

        ctx.strokeStyle = STROKES[idx];
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

        if (w > 18 && h > 14) {
          const num = c * rows + r + 1;
          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.font = `bold ${Math.min(11, Math.floor(Math.min(w,h)*0.38))}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(num, x + w / 2, y + h / 2);
        }
      }
    }
  }

  function drawContainerFrame(ctx, ox, oy, cW, cH, scale) {
    ctx.shadowColor = 'rgba(0,122,255,0.30)';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = '#007AFF';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(ox, oy, cW * scale, cH * scale);
    ctx.shadowBlur = 0;

    const m = 8;
    ctx.strokeStyle = '#1c1c1e';
    ctx.lineWidth = 1.5;
    [[ox,oy],[ox+cW*scale,oy],[ox,oy+cH*scale],[ox+cW*scale,oy+cH*scale]].forEach(([cx,cy],i) => {
      const dx = i%2===0?1:-1, dy = i<2?1:-1;
      ctx.beginPath(); ctx.moveTo(cx,cy+dy*m); ctx.lineTo(cx,cy); ctx.lineTo(cx+dx*m,cy); ctx.stroke();
    });
  }

  function drawAxisLabels(ctx, ox, oy, cW, cH, scale, xLabel, yLabel, xUnit, yUnit) {
    ctx.fillStyle = '#636366';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';

    ctx.fillText(`← ${xLabel}: ${xUnit} cm →`, ox + cW * scale / 2, oy + cH * scale + 20);

    ctx.save();
    ctx.translate(14, oy + cH * scale / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(`← ${yLabel}: ${yUnit} cm →`, 0, 0);
    ctx.restore();
  }

  function drawTitle(ctx, canvasW, text) {
    ctx.fillStyle = '#1c1c1e';
    ctx.font = 'bold 12px "Noto Sans TC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(text, canvasW / 2, 8);
  }

  function drawResidual(ctx, ox, oy, scale, cW, cH, usedW, usedH) {
    const rx = ox + usedW * scale;
    const ry = oy + usedH * scale;
    const remW = (cW - usedW) * scale;
    const remH = (cH - usedH) * scale;
    if (remW > 2) {
      ctx.fillStyle = 'rgba(255,59,48,0.10)';
      ctx.fillRect(rx, oy, remW, cH * scale);
      ctx.strokeStyle = 'rgba(255,59,48,0.40)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(rx, oy, remW, cH * scale);
      ctx.setLineDash([]);
      if (remW > 22) {
        ctx.fillStyle = '#FF3B30';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`+${cW - usedW}`, rx + remW / 2, oy + cH * scale / 2);
      }
    }
    if (remH > 2) {
      ctx.fillStyle = 'rgba(255,59,48,0.08)';
      ctx.fillRect(ox, ry, usedW * scale, remH);
      ctx.strokeStyle = 'rgba(255,59,48,0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(ox, ry, usedW * scale, remH);
      ctx.setLineDash([]);
      if (remH > 16) {
        ctx.fillStyle = '#FF3B30';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`+${cH - usedH}`, ox + usedW * scale / 2, ry + remH / 2);
      }
    }
  }

  // ── TOP VIEW ──
  {
    const { ctx, scale, ox, oy, cW, cH } = setupCanvas('top-canvas', cLen, cWid);
    drawTitle(ctx, ctx.canvas.width, `頂視圖（俯視）  ${lc} × ${wc} = ${lc*wc} 箱/層`);
    drawBoxGrid(ctx, ox, oy, scale, lc, wc, bLen, bWid, 0);
    drawResidual(ctx, ox, oy, scale, cLen, cWid, lc * bLen, wc * bWid);
    drawContainerFrame(ctx, ox, oy, cLen, cWid, scale);
    drawAxisLabels(ctx, ox, oy, cLen, cWid, scale, '長', '寬', cLen, cWid);
  }

  // ── FRONT VIEW ──
  {
    const { ctx, scale, ox, oy, cW, cH } = setupCanvas('front-canvas', cWid, cHgt);
    drawTitle(ctx, ctx.canvas.width, `前視圖  ${wc} × ${hc} 層 = ${wc*hc} 格`);
    drawBoxGrid(ctx, ox, oy, scale, wc, hc, bWid, bHgt, 1);
    drawResidual(ctx, ox, oy, scale, cWid, cHgt, wc * bWid, hc * bHgt);
    drawContainerFrame(ctx, ox, oy, cWid, cHgt, scale);
    drawAxisLabels(ctx, ox, oy, cWid, cHgt, scale, '寬', '高', cWid, cHgt);
  }

  // ── SIDE VIEW ──
  {
    const { ctx, scale, ox, oy, cW, cH } = setupCanvas('side-canvas', cLen, cHgt);
    drawTitle(ctx, ctx.canvas.width, `側視圖  ${lc} × ${hc} 層`);
    drawBoxGrid(ctx, ox, oy, scale, lc, hc, bLen, bHgt, 2);
    drawResidual(ctx, ox, oy, scale, cLen, cHgt, lc * bLen, hc * bHgt);
    drawContainerFrame(ctx, ox, oy, cLen, cHgt, scale);
    drawAxisLabels(ctx, ox, oy, cLen, cHgt, scale, '長', '高', cLen, cHgt);
  }
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  calculate(false);
});
</script>
</body>
</html>
